services:
  mongo:
    image: mongo:7
    container_name: super-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: super
    volumes:
      - mongo-data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    logging:
      driver: none

  server:
    build:
      context: ./server
    container_name: super-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_PROJECT_NAME: super
      BACKEND_URL: http://localhost:${BACKEND_PORT:-5000}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      FLASK_DEBUG: "False"
      PORT: 5000
    depends_on:
      - mongo
    ports:
      - "${BACKEND_PORT:-5000}:5000"

  client:
    build:
      context: ./client
    container_name: super-client
    restart: unless-stopped
    env_file:
      - ./client/.env
    environment:
      VITE_BACKEND_URL: http://localhost:${BACKEND_PORT:-5000}/api
      PORT: ${FRONTEND_PORT:-3000}
    depends_on:
      - server
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"

  # Free tier: one static domain per account (e.g. your-name.ngrok-free.app). Set NGROK_URL in server/.env.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: super-ngrok
    profiles:
      - ngrok
    entrypoint: ["sh", "-c"]
    command: ["ngrok http --url=$$NGROK_URL http://server:5000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_URL: ${NGROK_URL}
    depends_on:
      - server

volumes:
  mongo-data:

